<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Portals</title>
<!-- Telegram WebApp bridge: gives us .expand() etc. -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
  /* Full-bleed iframe, fills whatever height Telegram gives us */
  #frame {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    border: 0; display: block; background: #000;
  }
</style>
</head>
<body>
  <iframe id="frame"
    src="https://portals.to/?room=ec6ddc79-05b2-4487-9156-b3d1eb62fbfe"
    allow="autoplay; fullscreen; microphone; camera; xr-spatial-tracking; accelerometer; gyroscope; clipboard-write"
    allowfullscreen>
  </iframe>

  <script>
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();                 // tell Telegram we're loaded
        tg.expand();                // <-- forces the window to FULL height on open
        if (tg.requestFullscreen) { // newer Telegram clients (Bot API 8.0+) support true fullscreen
          try { tg.requestFullscreen(); } catch (e) {}
        }
        try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch (e) {} // stop swipe-to-close eating game input
        // Re-assert expand on viewport changes (Telegram sometimes resets it)
        tg.onEvent && tg.onEvent('viewportChanged', function () { tg.expand(); });
      }
      // Keep the iframe matched to the real viewport height on resize
      function fit() {
        document.getElementById('frame').style.height = window.innerHeight + 'px';
      }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
</body>
</html>
