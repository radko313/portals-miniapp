<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Portals</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
  #frame {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    border: 0; display: block; background: #000;
  }
</style>
</head>
<body>
  <iframe id="frame"
    src="https://portals.to/?room=ec6ddc79-05b2-4487-9156-b3d1eb62fbfe"
    allow="autoplay; fullscreen; microphone; camera; xr-spatial-tracking; accelerometer; gyroscope; clipboard-write"
    allowfullscreen>
  </iframe>

  <script>
    (function () {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        tg.ready();
        tg.expand();
        // Go fullscreen so Portals gets a real desktop-sized viewport and loads the game.
        if (tg.requestFullscreen) { try { tg.requestFullscreen(); } catch (e) {} }
        try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch (e) {}
        // Re-assert on viewport changes (Telegram sometimes resets it)
        tg.onEvent && tg.onEvent('viewportChanged', function () { tg.expand(); });
      }
      function fit() { document.getElementById('frame').style.height = window.innerHeight + 'px'; }
      window.addEventListener('resize', fit);
      fit();
    })();
  </script>
</body>
</html>
